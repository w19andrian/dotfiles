<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
<!-- append Noto as fallback for JetBrains -->
 <match>
  <test name="family">
   <string>JetBrainsMono Nerd Font Mono</string>
  </test>
  <edit mode="append" name="family">
   <string>Noto Color Emoji</string>
  </edit>
 </match>
</fontconfig>
