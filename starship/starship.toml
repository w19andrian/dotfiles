format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
$fill\
$gcloud\
$kubernetes\
$line_break$character"""

palette = 'catppuccin_mocha'

# Disable the blank line at the start of the prompt
add_newline = false

[os]
disabled = false
style = "fg:yellow"
format = "[$symbol ]($style)"

# OS symbols collections
[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

# You can also replace your username with a neat symbol like ’äĀ  or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:yellow"
style_root = "fg:yellow"
format = '[$user ]($style)'
disabled = false

[fill]
symbol = ' '
disabled = false

[directory]
style = "fg:sapphire"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░łÖ’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░łÖ " = " ¾░łÖ’ä¬ "

[c]
symbol = "Ņś× "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "ŅśØ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "’īł "
#style = "bg:col_05"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "ŅēĄ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Ņś¼ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "’Éś"
style = "fg:lavender"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:lavender"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "Ņś¦ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "ŅØĘ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "Ņē¢ "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "Ņśż "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "¾░åź "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "Ņ£╝ "
style = "fg:green"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = "Ņ×©"
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "Ņ£Ę "
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = true
time_format = "%R"             # Hour:Minute Format
style = "bg:col_06"
format = '[ ŌÖź $time ]($style)'

# [gcloud] # Uncomment when using gcloud
# format = '[ŅéČ](green)[($symbol)$account(@$domain)(\($project\))]($style)[Ņé┤](green)'
# style = "fg:surface2 bg:green"
# symbol = "¾▒ćČ "

[gcloud]
format = '[$symbol$account(\($project\))]($style) '
style = "fg:green"
symbol = "¾▒ćČ "

# [kubernetes]
# disabled = false
# symbol = 'ŅĀØ '
# format = '[ŅéČ](blue)[$symbol$context(\($namespace\))]($style)[Ņé┤](blue)'
# style = "fg:surface2 bg:blue"

[kubernetes]
disabled = false
symbol = 'ŅĀØ '
format = '[$symbol$context(\($namespace\))]($style)'
style = "fg:blue"

[[kubernetes.contexts]]
context_pattern = "gke_.*_(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŅŁ░](bold fg:green)'
error_symbol = '[ŅŁ░](bold fg:red)'
vimcmd_symbol = '[’äĆ](bold fg:green)'
vimcmd_replace_one_symbol = '[’äĆ](bold fg:lavender)'
vimcmd_replace_symbol = '[’äĆ](bold fg:lavender)'
vimcmd_visual_symbol = '[’äĆ](bold fg:yellow)'

